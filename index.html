<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MRED ADMIN - Preview</title>
  <style>
    /* Menggunakan palet warna Secure Entry anda */
    :root {
      --bg-color: #e9f5e9;
      --card-bg: #ffffff;
      --green-dark: #176B39;
      --green-light: #3bd97b;
      --green-grad: linear-gradient(145deg, #41e671 0%, #176B39 100%);
      --red-grad: linear-gradient(135deg, #e52d27 0%, #ff5757 100%);
      --shadow-soft: 0 10px 22px rgba(23, 107, 57, 0.08);
    }

    body {
      margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-color); color: var(--green-dark);
      padding-bottom: 80px; /* Ruang untuk bottom nav */
    }

    /* Bar Atas Kaca */
    .header {
      position: sticky; top: 0;
      background: rgba(233, 245, 233, 0.86);
      backdrop-filter: blur(10px);
      padding: 15px 20px;
      display: flex; justify-content: space-between; align-items: center;
      border-bottom: 2px solid rgba(65, 230, 113, 0.4);
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      z-index: 100;
    }
    .header-title { font-weight: 900; letter-spacing: 1px; }
    .header-user { font-size: 12px; font-weight: bold; background: var(--card-bg); padding: 5px 12px; border-radius: 20px; box-shadow: var(--shadow-soft); }

    .container { padding: 20px; max-width: 600px; margin: 0 auto; }

    /* Kad Statistik */
    .dashboard-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
    .stat-card {
      background: var(--card-bg); padding: 15px; border-radius: 14px;
      text-align: center; box-shadow: var(--shadow-soft);
      border: 1px solid rgba(23, 107, 57, 0.1);
    }
    .stat-title { font-size: 11px; font-weight: bold; letter-spacing: 0.5px; opacity: 0.8; }
    .stat-value { font-size: 24px; font-weight: 900; margin-top: 5px; color: var(--green-dark); }
    .stat-value.danger { color: #e52d27; }

    /* Senarai Rekod */
    .section-title { font-size: 14px; font-weight: 900; margin-bottom: 12px; letter-spacing: 1px; }
    .record-card {
      background: var(--card-bg); padding: 16px; border-radius: 14px;
      margin-bottom: 15px; box-shadow: var(--shadow-soft);
      border-left: 5px solid var(--green-light);
    }
    .record-header { display: flex; justify-content: space-between; font-size: 12px; font-weight: bold; margin-bottom: 8px; opacity: 0.7;}
    .record-name { font-size: 16px; font-weight: 900; margin-bottom: 4px; }
    .record-details { font-size: 13px; font-weight: bold; margin-bottom: 12px; }
    
    /* Butang */
    .btn-group { display: flex; gap: 10px; }
    .btn {
      flex: 1; padding: 10px; border: none; border-radius: 8px;
      font-weight: bold; font-size: 12px; letter-spacing: 1px; cursor: pointer;
      color: white; box-shadow: 0 3px 10px rgba(0,0,0,0.1);
    }
    .btn-view { background: var(--green-grad); }
    .btn-warn { background: var(--red-grad); }

    /* Navigasi Bawah */
    .bottom-nav {
      position: fixed; bottom: 15px; left: 50%; transform: translateX(-50%);
      background: var(--green-grad); width: 90%; max-width: 400px;
      border-radius: 30px; display: flex; justify-content: space-around;
      padding: 12px 0; box-shadow: 0 10px 25px rgba(23, 107, 57, 0.4);
      z-index: 100;
    }
    .nav-item { color: white; font-size: 11px; font-weight: bold; text-align: center; }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-title">MRED ADMIN</div>
    <div class="header-user">MRTech (Super)</div>
  </div>

  <div class="container">
    <div class="dashboard-grid">
      <div class="stat-card">
        <div class="stat-title">MASUK HARI INI</div>
        <div class="stat-value">142</div>
      </div>
      <div class="stat-card">
        <div class="stat-title">HALANGAN BLACKLIST</div>
        <div class="stat-value danger">3</div>
      </div>
    </div>

    <div class="section-title">REKOD TERKINI (LIVE)</div>
    
    <div class="record-card">
      <div class="record-header"><span>🕒 15:12 PM</span><span>LAZADA</span></div>
      <div class="record-name">ALI BIN ABU</div>
      <div class="record-details">MyKad: 860101-**-**** | Kenderaan: WAA 1234</div>
      <div class="btn-group">
        <button class="btn btn-view">📷 LIHAT IMBASAN</button>
        <button class="btn btn-warn">🛑 BLACKLIST</button>
      </div>
    </div>

    <div class="record-card">
      <div class="record-header"><span>🕒 14:55 PM</span><span>VISITOR (JMB)</span></div>
      <div class="record-name">CHONG WEI</div>
      <div class="record-details">MyKad: 901212-**-**** | Kenderaan: JQM 999</div>
      <div class="btn-group">
        <button class="btn btn-view">📷 LIHAT IMBASAN</button>
        <button class="btn btn-warn">🛑 BLACKLIST</button>
      </div>
    </div>
  </div>

  <div class="bottom-nav">
    <div class="nav-item">🏠<br>Utama</div>
    <div class="nav-item">🔍<br>Carian</div>
    <div class="nav-item">🛑<br>Blacklist</div>
    <div class="nav-item">⚙️<br>Tetapan</div>
  </div>

</body>
</html>
