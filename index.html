<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PWA Secure Entry Admin</title>
    
    <!-- PWA Basic Requirements -->
    <meta name="theme-color" content="#1e293b">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/icon-192x192.png">
    
    <!-- Tailwind CSS via CDN for quick preview -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 h-screen flex items-center justify-center p-4">

    <!-- Admin Login Card -->
    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        
        <!-- Header & Icon -->
        <div class="text-center mb-8">
            <div class="bg-blue-500 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/50">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8V7a4 4 0 00-8 0v4h8z"></path>
                </svg>
            </div>
            <h1 class="text-2xl font-bold text-white tracking-wide">Secure Entry</h1>
            <p class="text-slate-400 text-sm mt-2">PWA Admin Login</p>
        </div>

        <!-- Login Form -->
        <form>
            <div class="mb-6">
                <label class="block text-slate-300 text-sm font-semibold mb-2" for="username">
                    Username
                </label>
                <input class="w-full px-4 py-3 rounded-lg bg-slate-900 text-white border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" id="username" type="text" placeholder="Enter your username" required>
            </div>
            
            <div class="mb-6">
                <label class="block text-slate-300 text-sm font-semibold mb-2" for="password">
                    Password
                </label>
                <input class="w-full px-4 py-3 rounded-lg bg-slate-900 text-white border border-slate-700 focus:border-blue-500 focus:ring-2 focus:ring-blue-500 focus:outline-none transition-all" id="password" type="password" placeholder="••••••••" required>
            </div>
            
            <div class="flex items-center justify-between mb-8">
                <label class="flex items-center text-sm text-slate-400 cursor-pointer">
                    <input type="checkbox" class="form-checkbox bg-slate-900 border-slate-700 rounded text-blue-500 focus:ring-blue-500 focus:ring-offset-slate-800">
                    <span class="ml-2">Remember me</span>
                </label>
                <a class="text-sm text-blue-400 hover:text-blue-300 transition-colors" href="#">Forgot password?</a>
            </div>
            
            <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg shadow-lg shadow-blue-500/30 transition-all transform hover:scale-[1.02]" type="submit">
                Secure Login
            </button>
        </form>
    </div>

    <!-- Service Worker Registration for PWA -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(registration => {
                        console.log('ServiceWorker registration successful with scope:', registration.scope);
                    })
                    .catch(error => {
                        console.log('ServiceWorker registration failed:', error);
                    });
            });
        }
    </script>
</body>
</html>
