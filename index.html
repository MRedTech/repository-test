<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SECURE ENTRY SYSTEM</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="dns-prefetch" href="//cdn.jsdelivr.net">
  <link rel="preconnect" href="https://mredtech01.edreborn86.workers.dev" crossorigin>
  <link rel="dns-prefetch" href="//mredtech01.edreborn86.workers.dev">
  <link rel="preconnect" href="https://secure-entry-vision.edreborn86.workers.dev" crossorigin>
  <link rel="dns-prefetch" href="//secure-entry-vision.edreborn86.workers.dev">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css">

  <style>
    /* ==================================================
       GLOBAL STYLES
    ================================================== */
    :root {
      --se-green-1: #41e671;
      --se-green-2: #176B39;
      --se-green-3: #3bd97b;
      --se-text: #176B39;
      --se-placeholder: #a7b2ad;
      --se-card: #ffffff;
      --se-glow: rgba(59, 217, 123, .18);
      --se-glow-strong: rgba(59, 217, 123, .28);
    }

    html, body, button, input, select, textarea, label, h1, h2, h3, h4, h5, h6,
    .clock-bar, .header-gradient, .search-mini-title, .photo-label, .swal2-popup, 
    .swal2-title, .swal2-html-container, .swal2-confirm, .swal2-cancel, .footer {
      font-family: 'Google Sans', 'Google Sans Text', Roboto, Arial, sans-serif !important;
    }

    body {
      margin: 0;
      background: #e9f5e9;
      text-transform: uppercase;
      /* Fallback padding just in case JS sync takes a moment */
      padding: 130px 20px 20px 20px; 
    }

    /* Respect reduce-motion */
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
        scroll-behavior: auto !important;
      }
    }

    /* ==================================================
       HEADER
    ================================================== */
    .fixed-header {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      background: rgba(233, 245, 233, .86) !important;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(23, 107, 57, .12);
      z-index: 9999;
      padding: 14px 0 10px 0;
      box-shadow: 0 10px 26px rgba(0, 0, 0, .08) !important;
    }

    .fixed-header::after {
      content: "";
      display: block;
      height: 2px;
      width: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(65, 230, 113, .65) 20%, rgba(23, 107, 57, .75) 60%, transparent 100%);
      opacity: .55;
    }

    .header-inner {
      max-width: 420px;
      margin: 0 auto;
      text-align: center;
      padding: 0 20px;
    }

    .header-line {
      height: 3px;
      width: 60px;
      margin: 0 auto 4px auto;
      background: linear-gradient(90deg, #3bd97b 20%, #2b7a2b 80%);
      border-radius: 2px;
    }

    h2 {
      color: #2b7a2b;
      text-align: center;
      margin-top: 0.10px;
      margin-bottom: 30px;
      font-weight: 800;
    }

    .header-gradient {
      background: linear-gradient(145deg, #54e087 0%, #2b7a2b 100%);
      font-weight: 800;
      font-size: 1.8rem;
      letter-spacing: 0.8px;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }

    .clock-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      max-width: 180px;
      margin: 0 auto 10px auto;
      padding: 2.5px 12px;
      border-radius: 11px;
      background: linear-gradient(90deg, #41e671 0%, #176B39 100%);
      box-shadow: 0 1px 4px 0 #bbdfbb70;
      font-size: 11px;
      color: #fff;
      letter-spacing: 1.4px;
      font-weight: bold;
      opacity: 0.90;
      position: relative;
      z-index: 10;
    }

    .clock-date, .clock-time {
      font-size: 11px;
    }

    /* ==================================================
       CARDS & FORMS
    ================================================== */
    .search-minicard {
      max-width: 330px;
      margin: 18px auto 22px auto;
      background: #fff;
      border-radius: 13px;
      padding: 12px 15px 16px 15px;
      border: 1px solid rgba(23, 107, 57, .10);
      box-shadow: 0 10px 22px rgba(23, 107, 57, .08), 0 0 18px var(--se-glow) !important;
    }

    #registrationForm {
      max-width: 330px;
      margin: 0 auto 18px auto;
      background: var(--se-card);
      border-radius: 13px;
      border: 1px solid rgba(23, 107, 57, .10);
      box-shadow: 0 10px 22px rgba(23, 107, 57, .08), 0 0 18px var(--se-glow);
      padding: 12px 15px 16px 15px;
    }

    .search-mini-title {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 9px;
      font-size: 15px;
      font-weight: bold;
      color: #176B39;
      letter-spacing: 1px;
    }

    .search-emoji {
      margin-right: 7px;
      font-size: 1.18em;
    }

    label {
      display: block;
      margin-top: 10px;
      color: #2b7a2b;
      font-weight: bold;
      font-size: 13px;
    }

    /* ==================================================
       INPUTS & SELECTS
    ================================================== */
    input, select {
      width: 100%;
      padding: 7px 9px;
      margin-top: 4px;
      border: 1px solid #2b7a2b;
      border-radius: 8px;
      text-transform: uppercase;
      background-color: #e9f7ff;
      box-sizing: border-box;
      font-size: 13px;
      font-weight: bold;
    }

    .search-mini-input {
      width: 100%;
      padding: 6.5px 10px;
      font-size: 14px;
      border-radius: 7px;
      border: 1.5px solid #176B39;
      margin-bottom: 9px;
      font-weight: 500;
      background: #e9f7ff;
      box-sizing: border-box;
      transition: border 0.15s;
    }

    input::placeholder, .search-mini-input::placeholder {
      color: var(--se-placeholder) !important;
      opacity: .92;
    }

    select {
      color: #111111;
    }

    select.placeholder, select:required:invalid {
      color: var(--se-placeholder) !important;
    }

    select option {
      color: #111111;
    }

    select option[value=""] {
      color: var(--se-placeholder) !important;
    }

    select:invalid, .reason-placeholder, #reasonSelect {
      color: #888888 !important;
    }

    input:focus, select:focus, textarea:focus, .search-mini-input:focus {
      border: 1.6px solid var(--se-green-3) !important;
      background: #f6fff6 !important;
      outline: none !important;
      box-shadow: 0 0 0 3px rgba(59, 217, 123, .18) !important;
    }

    .se-invalid-blink, .se-invalid-blink:focus, .se-invalid-blink:focus-visible, .se-invalid-blink:invalid {
      border-color: rgba(231, 76, 60, .95) !important;
      box-shadow: 0 0 0 2px rgba(231, 76, 60, .25), 0 0 0 5px rgba(231, 76, 60, .12) !important;
      animation: seInvalidBlink 1s ease-in-out infinite;
    }

    @keyframes seInvalidBlink {
      0%, 100% {
        box-shadow: 0 0 0 2px rgba(231, 76, 60, .22), 0 0 0 5px rgba(231, 76, 60, .10);
      }
      50% {
        box-shadow: 0 0 0 3px rgba(231, 76, 60, .35), 0 0 0 7px rgba(231, 76, 60, .16);
      }
    }

    .phone-container {
      position: relative;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
    }

    .phone-container input {
      flex: 1;
      margin-right: 6px;
    }

    /* ==================================================
       BUTTONS
    ================================================== */
    .top-action {
      text-align: center;
      margin-bottom: 14px;
    }

    .btn-3d, .swal2-confirm, .call-btn-3d, .capture-btn-3d {
      background: linear-gradient(145deg, var(--se-green-1) 0%, var(--se-green-2) 100%) !important;
    }

    .btn-3d {
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      padding: 10px 22px;
      box-shadow: 0 3px 12px 0 #bbdfbb, 0 1.5px 3px #3333;
      letter-spacing: 1.6px;
      cursor: pointer;
      margin-bottom: 5px;
      transition: box-shadow 0.18s, transform 0.1s;
    }

    .btn-3d:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(23, 107, 57, .18), 0 0 18px var(--se-glow-strong);
    }

    .btn-3d:active {
      transform: translateY(2px) scale(.99);
      box-shadow: 0 2px 5px #bbb;
    }

    .btn-3d:disabled {
      opacity: .75;
      transform: none !important;
      box-shadow: 0 3px 10px rgba(0, 0, 0, .10) !important;
    }

    .submit-3d {
      margin-top: 14px;
      width: 100%;
    }

    .search-mini-btn {
      width: 100%;
      font-size: 16px;
      padding-top: 10px;
      padding-bottom: 10px;
      margin: 0 auto;
      box-sizing: border-box;
    }

    .call-btn-3d {
      display: none;
      color: #fff;
      border: none;
      border-radius: 100%;
      width: 50px;
      height: 50px;
      font-size: 17px;
      font-weight: bold;
      box-shadow: 0 3px 10px #8ed5a3, 0 1.5px 3px #3333;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      transition: box-shadow 0.18s, transform 0.1s;
      position: relative;
      margin-left: 5px;
      outline: none;
      text-decoration: none;
    }

    .call-btn-3d span {
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 1.5px;
      color: #fff;
    }

    .call-btn-3d:active {
      box-shadow: 0 2px 5px #bbb;
      transform: translateY(2px) scale(0.98);
    }

    /* ==================================================
       IMAGE & CAMERA
    ================================================== */
    .photo-label {
      color: #2b7a2b;
      font-weight: bold;
      font-size: 13px;
      margin-top: 4px;
      margin-bottom: 3px;
      display: block;
    }

    .image-container {
      position: relative;
      display: none;
      margin-top: 10px;
      margin-bottom: 12px;
      width: 100%;
      max-height: 220px;
      overflow: hidden;
      background-color: #f0f0f0;
      border: 1px solid #2b7a2b;
      border-radius: 6px;
    }

    .image-container img {
      width: 100%;
      height: auto;
      object-fit: cover;
      transform-origin: center;
    }

    .watermark {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%) rotate(-40deg);
      color: red;
      background: none;
      padding: 4px 20px;
      font-size: 11px;
      font-weight: bold;
      border-radius: 4px;
      pointer-events: none;
      letter-spacing: 4px;
      opacity: 0.75;
      z-index: 9;
      white-space: nowrap;
    }

    .camera-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.85);
      z-index: 99999;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .camera-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .camera-container {
      position: relative;
      width: 94vw;
      max-width: 400px;
      aspect-ratio: 4/3;
      background: #000;
      border-radius: 14px;
      overflow: hidden;
    }

    #camera-video {
      width: 100%;
      height: auto;
      border-radius: 14px;
      background: #222;
    }

    .guideline {
      position: absolute;
      border: 3px solid #28cc6c;
      border-radius: 8px;
      left: 50%;
      top: 50%;
      width: 92%;
      height: auto;
      aspect-ratio: var(--se-doc-ar, 1.585);
      transform: translate(-50%, -50%);
      pointer-events: none;
      box-sizing: border-box;
    }

    .guideline.ocr-ready {
      animation: ocrGoogleBorder 1.4s linear infinite, ocrGlow 0.8s ease-in-out infinite alternate;
    }

    @keyframes ocrGoogleBorder {
      0%   { border-color: #34A853; }
      25%  { border-color: #FBBC05; }
      50%  { border-color: #4285F4; }
      75%  { border-color: #EA4335; }
      100% { border-color: #34A853; }
    }

    @keyframes ocrGlow {
      0%   { box-shadow: 0 0 0 rgba(0, 0, 0, 0); }
      100% { box-shadow: 0 0 26px rgba(255, 255, 255, .35); }
    }

    .close-cam-btn {
      position: absolute;
      top: 10px;
      right: 13px;
      z-index: 100;
      background: #fff;
      color: #1c7e41;
      border: none;
      border-radius: 24px;
      font-size: 24px;
      line-height: 24px;
      padding: 2px 10px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 2px 10px #aaa;
    }

    .doc-mode-bar {
      position: absolute;
      left: 10px;
      top: 10px;
      z-index: 120;
      display: flex;
      gap: 6px;
      padding: 6px;
      border-radius: 12px;
      background: rgba(0, 0, 0, .28);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      pointer-events: auto;
    }

    .doc-pill {
      border: 1px solid rgba(255, 255, 255, .25);
      color: #fff;
      background: rgba(255, 255, 255, .08);
      border-radius: 999px;
      font-size: 10px;
      font-weight: 900;
      letter-spacing: 1.2px;
      padding: 6px 10px;
      cursor: pointer;
      user-select: none;
    }

    .doc-pill.active {
      background: linear-gradient(145deg, #41e671 0%, #176B39 100%);
      border-color: rgba(255, 255, 255, .28);
      box-shadow: 0 0 0 3px rgba(59, 217, 123, .18);
    }

    .capture-btn-3d {
      display: flex;
      justify-content: center;
      align-items: center;
      color: #fff;
      border: none;
      border-radius: 100%;
      width: 60px;
      height: 60px;
      font-size: 17px;
      font-weight: bold;
      box-shadow: 0 3px 10px #8ed5a3, 0 1.5px 3px #3333;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: box-shadow 0.18s, transform 0.1s;
      margin-top: 16px;
    }

    .camera-wrap .capture-btn-3d {
      position: static !important;
      margin-top: 14px;
      z-index: 999999;
    }

    #cameraModal .capture-btn-3d {
      position: static !important;
      left: auto !important;
      bottom: auto !important;
      transform: none !important;
    }

    .capture-btn-3d:active {
      box-shadow: 0 2px 5px #bbb;
      transform: translateY(2px) scale(0.98);
    }

    /* ==================================================
       OCR PANEL
    ================================================== */
    .ocr-panel {
      position: absolute;
      left: 10px;
      bottom: 10px;
      z-index: 60;
      pointer-events: none;
      user-select: none;
    }

    #ocrLivePanel.ocr-panel {
      position: absolute !important;
      left: 12px !important;
      top: calc(100% - 60px) !important;
      z-index: 9999;
      pointer-events: none;
      user-select: none;
    }

    .ocr-title {
      font-size: 11px;
      font-weight: 900;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: #ffffff;
      text-shadow: 0 1px 6px rgba(0, 0, 0, .55);
    }

    .ocr-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 5px 0;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
    }

    .ocr-item .dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .ocr-item.bad { color: #ff3b3b; }
    .ocr-item.bad .dot { background: #ff3b3b; box-shadow: 0 0 12px rgba(255, 59, 59, .65); }

    .ocr-item.good { color: #16c172; }
    .ocr-item.good .dot { background: #16c172; box-shadow: 0 0 12px rgba(22, 193, 114, .85); }

    /* ==================================================
       LOADING SPINNERS
    ================================================== */
    .spinner, .loader {
      display: inline-block;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      box-sizing: border-box;
      border: 3px solid rgba(255, 255, 255, 0.25);
      border-top-color: #ffffff;
      border-right-color: #ffffff;
      border-bottom-color: rgba(255, 255, 255, 0.1);
      border-left-color: rgba(255, 255, 255, 0.1);
      animation: google-spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes google-spin {
      0%   { transform: rotate(0deg); }
      50%  { transform: rotate(180deg); }
      100% { transform: rotate(360deg); }
    }

    /* ==================================================
       SWEETALERT2 CUSTOMIZATIONS
    ================================================== */
    .swal2-popup {
      width: 300px !important;
      max-width: 300px !important;
      padding: 14px 16px !important;
      border-radius: 14px !important;
    }

    .swal2-title {
      margin: 0 0 6px 0 !important;
      font-size: 16px !important;
      font-weight: 900 !important;
      letter-spacing: 1.2px !important;
    }

    .swal2-html-container {
      margin: 0 !important;
      font-size: 13px !important;
      font-weight: bold !important;
      line-height: 1.35 !important;
      letter-spacing: 0.7px !important;
    }

    .swal2-actions {
      margin: 12px 0 0 0 !important;
      gap: 10px;
    }

    .swal2-confirm, .swal2-cancel {
      color: #fff !important;
      font-weight: bold !important;
      border: none !important;
      border-radius: 10px !important;
      letter-spacing: 1.6px;
      padding: 10px 22px !important;
      font-size: 14px !important;
      transition: box-shadow 0.16s, transform 0.09s;
    }

    .swal2-confirm {
      box-shadow: 0 3px 12px 0 #bbdfbb, 0 1.5px 3px #3333 !important;
    }

    .swal2-cancel {
      background: linear-gradient(135deg, #e52d27 0%, #ff5757 100%) !important;
      box-shadow: 0 3px 10px #ffd2d2b9, 0 1.5px 3px #3333 !important;
      margin-left: 0 !important;
    }

    .swal2-confirm:active, .swal2-cancel:active {
      transform: translateY(2px);
    }

    .swal2-confirm:active { box-shadow: 0 2px 5px #bbb !important; }
    .swal2-cancel:active { box-shadow: 0 2px 6px #d8b !important; }

    @keyframes seSuccessPop {
      0% { transform: scale(.92); }
      100% { transform: scale(1); }
    }

    .swal2-icon.swal2-success {
      animation: seSuccessPop .18s ease-out;
    }

    .swal2-container { z-index: 99999 !important; }
    .swal2-popup.swal2-toast { box-shadow: 0 8px 20px rgba(0, 0, 0, .18); padding: 10px 12px !important; justify-content: center; }
    .swal2-popup.swal2-toast .swal2-title { font-size: 14px !important; letter-spacing: 0.8px !important; line-height: 1.15 !important; text-align: center; margin: 0; }
    .swal2-popup.swal2-toast .swal2-html-container { font-size: 12px !important; letter-spacing: 0.45px !important; line-height: 1.25 !important; }
    .swal2-popup.swal2-toast .swal2-icon { width: 1.6em !important; height: 1.6em !important; margin: 0 .55em 0 0 !important; }
    .swal2-popup.swal2-toast .swal2-icon-content { font-size: 1.15em !important; }

    .swal2-container.se-toast-near { pointer-events: none; }
    .swal2-container.se-toast-near .swal2-popup.swal2-toast { pointer-events: auto; }

    /* ==================================================
       FOOTER & MEDIA QUERIES
    ================================================== */
    .footer {
      position: fixed;
      bottom: 8px;
      left: 0;
      width: 100%;
      text-align: center;
      font-size: 10px;
      color: #9aa9a0;
      font-weight: bold;
      pointer-events: none;
    }

    @media (max-width: 500px) {
      .camera-container { max-width: 98vw; }
      .search-minicard { max-width: 97vw; padding: 9px 4vw 12px 4vw; }
      .search-mini-title { font-size: 15px; }
      .search-mini-input { font-size: 13px; padding: 6px 7px; }
      .search-mini-btn { font-size: 13px; padding-top: 8px; padding-bottom: 8px; }
    }
  </style>
</head>
<body>

  <div class="fixed-header">
    <div class="header-inner">
      <div class="clock-bar">
        <span id="liveDateOnly"></span>
        <span id="liveTimeOnly"></span>
      </div>
      <div style="text-align:center;margin-bottom:8px;">
        <h2 class="header-gradient" style="margin-bottom:0.18em;">SECURE ENTRY</h2>
        <div style="color:#489167;font-size:13px;letter-spacing:0.6px;margin-bottom:6px;">REGISTER.ACCESS.SECURE</div>
      </div>
      <div class="header-line"></div>
    </div>
  </div>

  <div class="search-minicard">
    <div class="search-mini-title">
      <span class="search-emoji">&#128269;</span>
      <span>SEARCH RECORD | SENSORY</span>
    </div>
    <input id="searchUniversal" type="text" placeholder="MYKAD / PASSPORT / REG NO" autocomplete="off" class="search-mini-input" style="font-weight:bold;">
    <button id="searchButton" class="btn-3d search-mini-btn" type="button" onclick="handleUniversalSearch()">SEARCH</button>
  </div>

  <div class="top-action">
    <button type="button" id="takePhotoBtn" class="btn-3d" onclick="openCamera()">TAKE PHOTO</button>
    <span class="photo-label">Take a photo of MyKad/Licence</span>
  </div>
  
  <div class="image-container" id="imageContainer">
    <img id="preview" src="#" alt="IMAGE PREVIEW">
    <div class="watermark">SENSORY USE ONLY</div>
  </div>

  <form id="registrationForm" autocomplete="off">
    <label for="namePassport">NAME</label>
    <input type="text" id="namePassport" name="namePassport" required>
    
    <label for="mykadPassport">MYKAD / PASSPORT</label>
    <input type="text" id="mykadPassport" name="mykadPassport" required>
    
    <label for="regnum">REGISTRATION NUMBER</label>
    <input type="text" id="regnum" name="regnum" required>

    function drawWatermarkOnCanvas(ctx, w, h) {
      const text = "SENSORY USE ONLY";
      ctx.save();
      ctx.translate(w * 0.5, h * 0.5);
      ctx.rotate(-40 * Math.PI / 180);
      ctx.globalAlpha = 0.75;
      ctx.fillStyle = "red";
      ctx.font = "bold 14px Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      const letters = text.split("");
      const spacing = 4;
      let totalW = 0;
      const metrics = letters.map(ch => {
        const m = ctx.measureText(ch).width;
        totalW += m;
        return m;
      });
      totalW += spacing * (letters.length - 1);

      let x = -totalW / 2;
      for (let i = 0; i < letters.length; i++) {
        ctx.fillText(letters[i], x + metrics[i] / 2, 0);
        x += metrics[i] + spacing;
      }
      ctx.restore();
    }

    function applyGrayscaleContrast(canvas, ctx) {
      const width = canvas.width;
      const height = canvas.height;
      const imageData = ctx.getImageData(0, 0, width, height);
      const data = imageData.data;
      let minL = 255;
      let maxL = 0;

      for (let i = 0; i < data.length; i += 4) {
        const lum = 0.299 * data[i] + 0.587 * data[i + 1] + 0.114 * data[i + 2];
        if (lum < minL) minL = lum;
        if (lum > maxL) maxL = lum;
        data[i] = data[i + 1] = data[i + 2] = lum;
      }

      const range = Math.max(1, maxL - minL);
      for (let i = 0; i < data.length; i += 4) {
        let stretched = ((data[i] - minL) * 255) / range;
        stretched = Math.max(0, Math.min(255, stretched));
        data[i] = data[i + 1] = data[i + 2] = stretched;
      }
      ctx.putImageData(imageData, 0, 0);
    }

    function adaptiveTone(canvas, ctx) {
      const w = canvas.width, h = canvas.height;
      const img = ctx.getImageData(0, 0, w, h);
      const d = img.data;
      let sum = 0;
      for (let i = 0; i < d.length; i += 4) sum += d[i];
      const mean = sum / Math.max(1, w * h);

      let gamma = 1.0;
      if (mean < 105) gamma = 0.85;
      else if (mean > 185) gamma = 1.12;

      if (gamma !== 1.0) {
        const inv = 1 / gamma;
        for (let i = 0; i < d.length; i += 4) {
          const nv = Math.pow(d[i] / 255, inv) * 255;
          d[i] = d[i + 1] = d[i + 2] = nv;
        }
        ctx.putImageData(img, 0, 0);
      }
    }

    function sharpenLight(canvas, ctx) {
      const w = canvas.width, h = canvas.height;
      if (w * h > 1200 * 900) return;
      const src = ctx.getImageData(0, 0, w, h);
      const d = src.data;
      const out = new Uint8ClampedArray(d.length);
      const idx = (x, y) => (y * w + x) * 4;

      for (let y = 1; y < h - 1; y++) {
        for (let x = 1; x < w - 1; x++) {
          const i = idx(x, y);
          let v = (5 * d[i] - d[idx(x - 1, y)] - d[idx(x + 1, y)] - d[idx(x, y - 1)] - d[idx(x, y + 1)]);
          out[i] = out[i + 1] = out[i + 2] = Math.max(0, Math.min(255, v));
          out[i + 3] = d[i + 3];
        }
      }

      for (let x = 0; x < w; x++) {
        let i1 = idx(x, 0), i2 = idx(x, h - 1);
        out[i1] = d[i1]; out[i1 + 1] = d[i1 + 1]; out[i1 + 2] = d[i1 + 2]; out[i1 + 3] = d[i1 + 3];
        out[i2] = d[i2]; out[i2 + 1] = d[i2 + 1]; out[i2 + 2] = d[i2 + 2]; out[i2 + 3] = d[i2 + 3];
      }
      for (let y = 0; y < h; y++) {
        let i1 = idx(0, y), i2 = idx(w - 1, y);
        out[i1] = d[i1]; out[i1 + 1] = d[i1 + 1]; out[i1 + 2] = d[i1 + 2]; out[i1 + 3] = d[i1 + 3];
        out[i2] = d[i2]; out[i2 + 1] = d[i2 + 1]; out[i2 + 2] = d[i2 + 2]; out[i2 + 3] = d[i2 + 3];
      }
      src.data.set(out);
      ctx.putImageData(src, 0, 0);
    }

    function isBlurryFromCanvas(canvas, ctx) {
      const w = canvas.width, h = canvas.height;
      const img = ctx.getImageData(0, 0, w, h).data;
      const step = (w * h > 700000) ? 3 : 2;
      let sum = 0, sum2 = 0, n = 0;
      const get = (x, y) => img[(y * w + x) * 4];

      for (let y = 1; y < h - 1; y += step) {
        for (let x = 1; x < w - 1; x += step) {
          const lap = 4 * get(x, y) - get(x - 1, y) - get(x + 1, y) - get(x, y - 1) - get(x, y + 1);
          sum += lap;
          sum2 += lap * lap;
          n++;
        }
      }
      const mean = sum / Math.max(1, n);
      const varr = (sum2 / Math.max(1, n)) - (mean * mean);
      const th = (DOC_MODE.current === 'PASSPORT') ? 85 : 95;
      return varr < th;
    }

    /* =========================
       MYKAD AUTO DASH
    ========================= */
    (function attachMykadAutoDash() {
      const mykadInput = document.getElementById('mykadPassport');
      if (!mykadInput) return;

      function formatMykadProgressive(digits) {
        const d = (digits || '').slice(0, 12);
        if (d.length <= 6) return d;
        if (d.length <= 8) return d.slice(0, 6) + '-' + d.slice(6);
        return d.slice(0, 6) + '-' + d.slice(6, 8) + '-' + d.slice(8);
      }

      function caretFromDigitsCount(formatted, digitsBefore) {
        if (!digitsBefore) return 0;
        let count = 0;
        for (let i = 0; i < formatted.length; i++) {
          if (/\d/.test(formatted[i])) count++;
          if (count >= digitsBefore) return i + 1;
        }
        return formatted.length;
      }

      function caretFromAllowedCount(str, allowedBefore) {
        return Math.min(allowedBefore, str.length);
      }

      mykadInput.addEventListener('input', function () {
        const raw = (this.value || '').toUpperCase();
        const caretPos = this.selectionStart || 0;
        const alnumBeforeCaret = raw.slice(0, caretPos).replace(/[^A-Z0-9]/g, '');
        const alnum = raw.replace(/[^A-Z0-9]/g, '');
        const hasLetter = /[A-Z]/.test(alnum);

        if (hasLetter) {
          this.value = alnum;
          const newCaret = caretFromAllowedCount(alnum, alnumBeforeCaret.length);
          try { this.setSelectionRange(newCaret, newCaret); } catch (e) {}
          validateMykadPassport();
          return;
        }

        const digitsBeforeCaret = raw.slice(0, caretPos).replace(/\D/g, '').length;
        const digits = raw.replace(/\D/g, '').slice(0, 12);
        const formatted = formatMykadProgressive(digits);

        this.value = formatted;
        const newCaret = caretFromDigitsCount(formatted, Math.min(digitsBeforeCaret, digits.length));
        try { this.setSelectionRange(newCaret, newCaret); } catch (e) {}

        validateMykadPassport();
      });
    })();

    function validateMykadPassport() {
      const el = document.getElementById('mykadPassport');
      if (!el) return true;
      const raw = (el.value || '').toUpperCase().trim();
      if (!raw) {
        el.setCustomValidity('');
        return true;
      }
      const alnum = raw.replace(/[^A-Z0-9]/g, '');
      const hasLetter = /[A-Z]/.test(alnum);
      if (hasLetter) {
        el.setCustomValidity('');
        return true;
      }
      const digits = alnum.replace(/[^0-9]/g, '');
      if (digits.length !== 12) {
        el.setCustomValidity('MyKad must contain 12 digits.');
        return false;
      }
      el.setCustomValidity('');
      return true;
    }

    /* =========================
       CAMERA / OCR
    ========================= */
    function openCamera() {
      document.getElementById('cameraModal').style.display = 'flex';
      setDocMode(DOC_MODE.current);
      startCamera();
    }

    async function startCamera() {
      video = document.getElementById('camera-video');
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        video.srcObject = stream;
        try {
          const track = stream.getVideoTracks && stream.getVideoTracks()[0];
          if (track && track.getCapabilities) {
            const caps = track.getCapabilities();
            const adv = {};
            if (caps.focusMode && Array.isArray(caps.focusMode)) {
              if (caps.focusMode.includes('continuous')) adv.focusMode = 'continuous';
              else if (caps.focusMode.includes('single-shot')) adv.focusMode = 'single-shot';
            }
            if (caps.exposureMode && Array.isArray(caps.exposureMode)) {
              if (caps.exposureMode.includes('continuous')) adv.exposureMode = 'continuous';
            }
            if (caps.whiteBalanceMode && Array.isArray(caps.whiteBalanceMode)) {
              if (caps.whiteBalanceMode.includes('continuous')) adv.whiteBalanceMode = 'continuous';
            }
            if (Object.keys(adv).length) {
              await track.applyConstraints({ advanced: [adv] });
            }
          }
        } catch (e) {}

        await video.play().catch(() => {});
        startOcrLive();
      } catch (e) {
        alert("Failed to open camera: " + e.message);
        closeCameraModal();
      }
    }

    function closeCameraModal() {
      document.getElementById('cameraModal').style.display = 'none';
      stopOcrLive();
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
    }

    function setOcrItem(key, ok) {
      const el = document.querySelector(`#ocrLivePanel .ocr-item[data-key="${key}"]`);
      if (!el) return;
      el.classList.toggle("good", !!ok);
      el.classList.toggle("bad", !ok);
    }

    function calcStats(gray) {
      let sum = 0, sum2 = 0;
      for (let i = 0; i < gray.length; i++) {
        sum += gray[i]; sum2 += gray[i] * gray[i];
      }
      const mean = sum / gray.length;
      return { mean, std: Math.sqrt(Math.max(0, (sum2 / gray.length) - (mean * mean))) };
    }

    function calcSharpness(gray, w, h) {
      let sum = 0, sum2 = 0, n = 0;
      for (let y = 1; y < h - 1; y++) {
        const row = y * w;
        for (let x = 1; x < w - 1; x++) {
          const i = row + x;
          const lap = (4 * gray[i] - gray[i - 1] - gray[i + 1] - gray[i - w] - gray[i + w]);
          sum += lap; sum2 += lap * lap; n++;
        }
      }
      const mean = sum / n;
      return (sum2 / n) - (mean * mean);
    }

    function getGrayFrame(videoEl, canvasEl) {
      const ctx = canvasEl.getContext("2d", { willReadFrequently: true });
      const w = canvasEl.width, h = canvasEl.height;
      ctx.drawImage(videoEl, 0, 0, w, h);
      const data = ctx.getImageData(0, 0, w, h).data;
      const gray = new Uint8Array(w * h);
      for (let i = 0, p = 0; i < data.length; i += 4, p++) {
        gray[p] = (0.2126 * data[i] + 0.7152 * data[i + 1] + 0.0722 * data[i + 2]) | 0;
      }
      return { gray, w, h };
    }

    function pctExtreme(gray, mode) {
      let c = 0;
      for (let i = 0; i < gray.length; i++) {
        if (mode === "white" && gray[i] >= 220) c++;
        if (mode === "black" && gray[i] <= 18) c++;
      }
      return c / gray.length;
    }

    function hasWhiteCluster(gray, w, h) {
      const MIN_CLUSTER = Math.floor(w * h * 0.008);
      let run = 0;
      for (let i = 0; i < gray.length; i += 2) {
        if (gray[i] >= 215) {
          run++;
          if (run >= MIN_CLUSTER) return true;
        } else {
          run = 0;
        }
      }
      return false;
    }

    let lastFrameGray = null;

    function calcStability(gray) {
      if (!lastFrameGray) {
        lastFrameGray = new Uint8Array(gray.length);
        lastFrameGray.set(gray);
        return false;
      }
      let diff = 0, samples = 0;
      for (let i = 0; i < gray.length; i += 30) {
        diff += Math.abs(gray[i] - lastFrameGray[i]);
        samples++;
      }
      lastFrameGray.set(gray);
      return (diff / Math.max(1, samples)) <= OCR_LIVE.TH.stabilityAvgDiff;
    }

    function startOcrLive() {
      const videoEl = document.getElementById("camera-video");
      const canvasEl = document.getElementById("ocrProbe");
      const guidelineEl = document.getElementById("ocrGuideline");
      if (!videoEl || !canvasEl) return;

      OCR_LIVE.running = true;
      OCR_LIVE.lastTick = 0;
      lastFrameGray = null;
      if (guidelineEl) guidelineEl.classList.remove("ocr-ready");

      const loop = () => {
        if (!OCR_LIVE.running) return;
        const now = performance.now();
        if (now - OCR_LIVE.lastTick < 90) {
          OCR_LIVE.rafId = requestAnimationFrame(loop);
          return;
        }
        OCR_LIVE.lastTick = now;

        if (videoEl.readyState >= 2 && !videoEl.paused && !videoEl.ended) {
          const { gray, w, h } = getGrayFrame(videoEl, canvasEl);
          const sharp = calcSharpness(gray, w, h);
          const { mean, std } = calcStats(gray);

          const okSharp = sharp >= OCR_LIVE.TH.sharpness;
          const okStable = calcStability(gray);
          const okLight = (mean >= OCR_LIVE.TH.brightnessMin) && (mean <= OCR_LIVE.TH.brightnessMax);
          const okContrast = std >= OCR_LIVE.TH.contrast;

          const glarePct = pctExtreme(gray, "white");
          const shadowPct = pctExtreme(gray, "black");
          const okGlare = (glarePct < OCR_LIVE.TH.glareWhitePct) && (shadowPct < OCR_LIVE.TH.shadowBlackPct) && !hasWhiteCluster(gray, w, h);
          const okClarity = okSharp && okStable && okLight && okContrast && okGlare;

          setOcrItem("sharp", okSharp);
          setOcrItem("stable", okStable);
          setOcrItem("light", okLight);
          setOcrItem("contrast", okContrast);
          setOcrItem("glare", okGlare);
          setOcrItem("clarity", okClarity);

          if (guidelineEl) guidelineEl.classList.toggle("ocr-ready", okClarity);
        }
        OCR_LIVE.rafId = requestAnimationFrame(loop);
      };

      if (OCR_LIVE.rafId) cancelAnimationFrame(OCR_LIVE.rafId);
      OCR_LIVE.rafId = requestAnimationFrame(loop);
    }

    function getGuidelineCropRatios() {
      const container = document.querySelector('.camera-container');
      const guideline = document.querySelector('.guideline');
      const videoEl   = document.getElementById('camera-video');
      if (!container || !guideline || !videoEl) return null;

      const g = guideline.getBoundingClientRect();
      let vRect = videoEl.getBoundingClientRect();
      if (!vRect || vRect.width < 2 || vRect.height < 2) vRect = container.getBoundingClientRect();

      return {
        left: clamp01((g.left - vRect.left) / vRect.width),
        top: clamp01((g.top - vRect.top) / vRect.height),
        w: clamp01(g.width / vRect.width),
        h: clamp01(g.height / vRect.height)
      };
    }

    function buildFinalImageFromSourceCrop(drawSourceCropFn, options) {
      options = options || {};
      const burnInWatermark = options.burnInWatermark !== false;
      const info = drawSourceCropFn();
      if (!info || !info.outW || !info.outH) return "";

      const preset = (DOC_MODE.presets[DOC_MODE.current] || DOC_MODE.presets.CARD);
      const targetAR = preset && preset.ar ? preset.ar : 1.585;
      const desiredH = Math.max(1, Math.round(info.outW / targetAR));
      const finalH = Math.min(info.outH, desiredH);
      const srcY = Math.max(0, Math.round((info.outH - finalH) / 2));

      __SE_CAPTURE.ensureSize(__SE_CAPTURE.final, info.outW, finalH);
      __SE_CAPTURE.ctxFinal.clearRect(0, 0, info.outW, finalH);
      __SE_CAPTURE.ctxFinal.drawImage(__SE_CAPTURE.scaled, 0, srcY, info.outW, finalH, 0, 0, info.outW, finalH);

      applyGrayscaleContrast(__SE_CAPTURE.final, __SE_CAPTURE.ctxFinal);
      adaptiveTone(__SE_CAPTURE.final, __SE_CAPTURE.ctxFinal);
      sharpenLight(__SE_CAPTURE.final, __SE_CAPTURE.ctxFinal);

      if (burnInWatermark) drawWatermarkOnCanvas(__SE_CAPTURE.ctxFinal, info.outW, finalH);
      const presetQ = preset.q || CAPTURE_JPEG_Q;
      return __SE_CAPTURE.final.toDataURL('image/jpeg', presetQ);
    }

    function captureImage() {
      if (!video) return;
      const ratios = getGuidelineCropRatios();
      if (!ratios) return;
      const vw = video.videoWidth || 0, vh = video.videoHeight || 0;
      if (vw < 2 || vh < 2) return;

      const cleanDataUrl = buildFinalImageFromSourceCrop(() => {
        const sx = Math.round(vw * ratios.left), sy = Math.round(vh * ratios.top);
        const sw = Math.round(vw * ratios.w), sh = Math.round(vh * ratios.h);
        const safeSW = Math.max(1, Math.min(sw, vw - sx)), safeSH = Math.max(1, Math.min(sh, vh - sy));
        const preset = DOC_MODE.presets[DOC_MODE.current] || DOC_MODE.presets.CARD;
        const outW = Math.min(preset.maxW || CAPTURE_MAX_W, safeSW);
        const outH = Math.max(1, Math.round(safeSH * (outW / safeSW)));

        __SE_CAPTURE.ensureSize(__SE_CAPTURE.scaled, outW, outH);
        __SE_CAPTURE.ctxScaled.clearRect(0, 0, outW, outH);
        __SE_CAPTURE.ctxScaled.drawImage(video, sx, sy, safeSW, safeSH, 0, 0, outW, outH);
        return { outW, outH };
      }, { burnInWatermark: false });

      if (!cleanDataUrl) return;

      try {
        if (isBlurryFromCanvas(__SE_CAPTURE.final, __SE_CAPTURE.ctxFinal)) {
          safeSwalFire({ icon: 'warning', title: 'IMAGE BLUR', text: 'PLEASE RETAKE THE ID PHOTO (HOLD STEADY)', confirmButtonText: 'RETAKE' });

      } catch (e) {}

      const watermarkedDataUrl = (() => {
        drawWatermarkOnCanvas(__SE_CAPTURE.ctxFinal, __SE_CAPTURE.final.width, __SE_CAPTURE.final.height);
        return __SE_CAPTURE.final.toDataURL('image/jpeg', (DOC_MODE.presets[DOC_MODE.current] || DOC_MODE.presets.CARD).q || CAPTURE_JPEG_Q);
      })();

      if (watermarkOverlay) watermarkOverlay.style.display = '';

          const res = await fetch(OCR_WORKER_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ image: cleanDataUrl.split(",")[1] })
          });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const result = await res.json();
          document.body.style.cursor = 'default';
          if (result.error) throw new Error("AI Message: " + result.message);

          if (result.name || result.idnum) {
            if (result.name) document.getElementById('namePassport').value = filterNonNameWords(result.name.toUpperCase().trim());

            Swal.fire({ toast: true, position: 'top', icon: 'success', title: 'AUTOFILL SUCCESSFUL', showConfirmButton: false, timer: 2000 });
          } else {
            throw new Error("No usable data was found in the image.");
          }
        } catch (err) {
          document.body.style.cursor = 'default';
          Swal.fire({ icon: 'error', title: 'AUTOFILL FAILED', text: err.message || 'Please fill in the form manually.', confirmButtonText: 'OK' });
        }
      })();

    function filterNonNameWords(text) {
      if (!text) return "";

      text = (function joinConnectorLines(raw) {
        if (!raw) return raw;
        let lines = String(raw).replace(/\r/g, "").split("\n").map(l => l.trim()).filter(Boolean);
        if (lines.length < 2) return raw;
        const isConnEnd = (s) => /\b(BIN|BINTI|A\/L|A\/P)\s*$/i.test(s);
        const isConnStart = (s) => /^(BIN|BINTI|A\/L|A\/P)\b/i.test(s);
        const looksNameish = (s) => {
          const u = String(s || "").toUpperCase().trim();
          if (!u || /\d/.test(u)) return false;
          if (/\b(ALAMAT|ADDRESS|NO\.?|LOT|KG\.?|KAMPUNG|JALAN|PANGSAPURI|PEKAN|LORONG|TAMAN|TMN|BANDAR|SEKSYEN|PERSIARAN|POSKOD|POSTCODE|\d{5})\b/.test(u)) return false;
          return u.length >= 2;
        };

        for (let i = 0; i < lines.length; i++) {
          if (isConnEnd(lines[i]) && i + 1 < lines.length && looksNameish(lines[i + 1])) {
            lines[i] = (lines[i] + " " + lines[i + 1]).replace(/\s+/g, " ").trim();
            lines.splice(i + 1, 1);
            i = Math.max(i - 1, 0); continue;
          }
          if (isConnStart(lines[i]) && i - 1 >= 0 && looksNameish(lines[i - 1])) {
            lines[i - 1] = (lines[i - 1] + " " + lines[i]).replace(/\s+/g, " ").trim();
            lines.splice(i, 1);
            i = Math.max(i - 2, 0); continue;
          }
        }
        return lines.join("\n");
      })(text);

      if (!window.__SE_NONNAME_CACHE) {
        const normalizeForFilter = (s) => (s || "").toString().toUpperCase().replace(/[^A-Z0-9\s\/'\-]/g, " ").replace(/\s+/g, " ").trim();
        const singles = new Set();
        const phrases = [];
        (NON_NAME_WORDS || []).forEach((w) => {
          const nw = normalizeForFilter(w);
          if (!nw) return;
          if (w.includes(" ")) phrases.push(new RegExp("(^|\\s)+" + nw.replace(/\s+/g, "\\s+") + "(?=\\s|$)", "g"));
          else singles.add(nw);
        });
        phrases.sort((a, b) => b.source.length - a.source.length);
        window.__SE_NONNAME_CACHE = { normalizeForFilter, singles, phrases };
      }

      const { normalizeForFilter, singles, phrases } = window.__SE_NONNAME_CACHE;
      let t = normalizeForFilter(text);
      const addrIdx = t.search(/\b(ALAMAT|ADDRESS|NO\.?|JALAN|PANGSAPURI|PEKAN|LORONG|TAMAN|TMN|KAMPUNG|KG|BANDAR|SEKSYEN|PERSIARAN|APARTMENT|APARTMEN|FLAT|RESIDENSI|HEIGHTS?|HEIGHT)\b/);
      if (addrIdx !== -1) t = t.slice(0, addrIdx).trim();

      for (const re of phrases) t = t.replace(re, " ");
      let cleaned = t.split(/\s+/).filter(Boolean).filter(w => !singles.has(w)).join(" ").replace(/\s+/g, " ").trim();
      const finalName = cleaned.trim().toUpperCase();

      if (!finalName || (NON_NAME_WORDS || []).includes(finalName) || /\d/.test(finalName)) return "";
      if (/\b(KG\.?|KAMPUNG|TAMAN|TMN|BANDAR|JALAN|PANGSAPURI|PEKAN|LORONG|PERSIARAN|SEKSYEN|LOT|POSKOD|POSTCODE|DAERAH|MUKIM|NEGERI|WILAYAH|HEIGHTS?|HEIGHT|APARTMENT|APARTMEN|FLAT|RESIDENSI)\b/.test(finalName)) return "";
      if (/\b(BIN|BINTI|A\/L|A\/P)\b/.test(finalName)) return finalName;

      const words = finalName.split(/\s+/).filter(Boolean);
      if (words.length < 2 || words.length > 4 || words.some(w => w.length < 2) || !/[AEIOU]/.test(finalName)) return "";
      if (/^(KG\.?|KAMPUNG|TAMAN|TMN|BANDAR|JALAN|PANGSAPURI|PEKAN|LORONG|PERSIARAN|SEKSYEN|LOT|NO)\b/.test(finalName)) return "";

      return finalName;
    }

    function detectSearchField(raw) {
      const s = (raw || "").trim().toUpperCase();
      const digitsOnly = s.replace(/[^0-9]/g, ""), alnumOnly = s.replace(/[^A-Z0-9]/g, "");
      if (digitsOnly.length === 12 && !/[A-Z]/.test(alnumOnly)) return FIELD.ID;
      if (/^\d{6}-\d{2}-\d{4}$/.test(s)) return FIELD.ID;
      if (/^[A-Z]{1,3}\d{6,}[A-Z]{3}$/.test(alnumOnly) || /^[A-Z]{1,3}\d{6,}$/.test(alnumOnly)) return FIELD.ID;
      if (/^[A-Z]{1,3}\d{4}[A-Z]?$/.test(alnumOnly)) return FIELD.REG;
      return (/[A-Z]/.test(alnumOnly) ? FIELD.REG : FIELD.ID);
    }

    async function searchRecord(field, value) {
      const cacheKey = `SE_SRCH_${field}|${value}`;
      if (!window.__SE_SEARCH_CACHE) window.__SE_SEARCH_CACHE = new Map();
      const cached = window.__SE_SEARCH_CACHE.get(cacheKey);
      if (cached && (Date.now() - cached.t) < 15000) return cached.v;

      if (!window.__SE_SEARCH_INFLIGHT) window.__SE_SEARCH_INFLIGHT = new Map();
      if (window.__SE_SEARCH_INFLIGHT.has(cacheKey)) return await window.__SE_SEARCH_INFLIGHT.get(cacheKey);

      const doFetch = (async () => {
        const url = `${WORKER_URL}?field=${encodeURIComponent(field)}&value=${encodeURIComponent(value)}`;
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 30000);
        try {
          const res = await fetch(url, { cache: "no-store", keepalive: true, signal: controller.signal });
          if (!res.ok) throw new Error(`Search failed (${res.status}): ${await res.text().catch(() => "")}`);
          const js = await res.json();
          window.__SE_SEARCH_CACHE.set(cacheKey, { t: Date.now(), v: js });
          return js;
        } finally {
          clearTimeout(timeoutId);
        }
      })();
      window.__SE_SEARCH_INFLIGHT.set(cacheKey, doFetch);
      try { return await doFetch; } finally { window.__SE_SEARCH_INFLIGHT.delete(cacheKey); }
    }

    function applySearchInputToForm(originalInput, detectedField) {
      const raw = (originalInput || "").trim();
      if (!raw) return;
      const which = detectedField || detectSearchField(raw) || "";
      if (which === FIELD.ID) {
        const idEl = document.getElementById('mykadPassport');
        if (idEl && !idEl.value) { idEl.value = raw.toUpperCase(); idEl.dispatchEvent(new Event('input')); }
      } else {
        const regEl = document.getElementById('regnum');
        if (regEl && !regEl.value) regEl.value = raw.toUpperCase();
      }
    }

    async function handleUniversalSearch() {
      const btn = document.getElementById('searchButton');
      const inputEl = document.getElementById('searchUniversal');
      const input = (inputEl ? inputEl.value : '').trim();
      if (!input) return;

      const originalInput = input, valueNorm = normalize(input), detectedField = detectSearchField(input);
      btn.disabled = true;
      btn.innerHTML = '<span class="loader"></span> SEARCHING...';

      try {
        let found = null, hasHyperlink = false;
        const res = await searchRecord(detectedField, valueNorm);

        if (res && res.exist) {
          found = res.data || null;
          hasHyperlink = (res.hasHyperlink !== undefined) ? res.hasHyperlink : false;
        }

        if (found) {
          const returnedRegNorm = normalize(found.regnum || ""), returnedIdNorm = normalize(found.mykadPassport || "");
          let isMatch = true;
          if (detectedField === FIELD.REG) isMatch = returnedRegNorm ? (returnedRegNorm === valueNorm) : true;
          else if (detectedField === FIELD.ID) isMatch = returnedIdNorm ? (returnedIdNorm === valueNorm) : true;
          else isMatch = (returnedRegNorm || returnedIdNorm) ? ((returnedRegNorm === valueNorm) || (returnedIdNorm === valueNorm)) : true;

          if (!isMatch) {
            await safeSwalFire({
              title: 'MISMATCH DETECTED',
              text: 'The returned record does not match your search.',
              html: `<div style="text-align:left; line-height:1.45;"><div><b>YOU SEARCHED:</b> ${originalInput.toUpperCase()}</div><div style="margin-top:6px;"><b>RECORD RETURNED:</b> ${((detectedField === FIELD.REG ? found.regnum : found.mykadPassport) || found.regnum || found.mykadPassport || "").toUpperCase() || 'UNKNOWN'}</div><div style="margin-top:10px;">Please try again.</div></div>`,
              icon: 'warning', confirmButtonText: 'TRY AGAIN', background: 'linear-gradient(135deg, #fff9e6 0%, #ffecb3 45%, #ffd54f 100%)', color: '#176B39'
            });
            try { inputEl.focus(); if (inputEl.select) inputEl.select(); } catch (e) {}
            return;
          }
        }

        if (found && !hasHyperlink) {
          window.__SE_LAST_SEARCH_STATUS = 'EXPIRED';
          window.__SE_EXISTING_PHOTO_LINK = '';
          safeSwalFire({
            title: 'PREVIOUS RECORD EXPIRED', text: 'Please retake the ID photo.', icon: 'warning', showCancelButton: true, confirmButtonText: 'OK', cancelButtonText: 'NO', background: 'linear-gradient(135deg, #fff9e6 0%, #ffecb3 45%, #ffd54f 100%)', color: '#176B39'
          }).then((r) => {
            inputEl.value = "";
            if (r.isConfirmed) { applySearchInputToForm(originalInput, detectedField); const form = document.getElementById('registrationForm'); if(form) { form.scrollIntoView({ behavior: 'smooth', block: 'center' }); } openCamera(); }
          });
          return;
        }

        if (found) {
          window.__SE_LAST_SEARCH_STATUS = 'FOUND';
          window.__SE_EXISTING_PHOTO_LINK = (found.photoLink || found.photoURL || found.photoUrl || found.existingPhotoLink || '').toString().trim();
          safeSwalFire({
            title: 'RECORD FOUND', text: 'Autofill this form with the existing record details?', icon: 'success', showCancelButton: true, confirmButtonText: 'YES', cancelButtonText: 'NO', background: 'linear-gradient(135deg, #e9f7ef 0%, #c8efd9 45%, #9fdfbf 100%)', color: '#176B39'
          }).then((r) => {
            if (r.isConfirmed) { try { autofillForm(found); } catch (e) {} const form = document.getElementById('registrationForm'); if(form) { form.scrollIntoView({ behavior: 'smooth', block: 'center' }); } }
            inputEl.value = "";
          });
          return;
        }

        window.__SE_LAST_SEARCH_STATUS = 'NO_RECORD';
        window.__SE_EXISTING_PHOTO_LINK = '';
        safeSwalFire({
          title: 'NO PREVIOUS RECORD', text: 'Please proceed with registration.', icon: 'warning', showCancelButton: true, confirmButtonText: 'OK', cancelButtonText: 'NO', background: 'linear-gradient(135deg, #e1f5fe 0%, #b3e5fc 45%, #81d4fa 100%)', color: '#176B39'
        }).then((r) => {
          inputEl.value = "";
          if (r.isConfirmed) { applySearchInputToForm(originalInput, detectedField); const form = document.getElementById('registrationForm'); if(form) { form.scrollIntoView({ behavior: 'smooth', block: 'center' }); } openCamera(); }
        });

      } catch (err) {
        const isAbort = (err && err.name === "AbortError") || /aborted|signal/i.test((err && err.message) || "");
        safeSwalFire({ title: 'ERROR', text: isAbort ? 'Connection timed out or was interrupted. Please try again.' : ((err && err.message) || 'Please try again'), icon: 'error', confirmButtonText: 'OK' });
      } finally {
        btn.disabled = false; btn.innerHTML = 'SEARCH';
      }
    }

    function autofillForm(data) {
      if (data.namePassport) document.getElementById('namePassport').value = data.namePassport;
      if (data.mykadPassport) { const icEl = document.getElementById('mykadPassport'); if (icEl) { icEl.value = data.mykadPassport; icEl.dispatchEvent(new Event('input')); } }
      if (data.regnum) document.getElementById('regnum').value = data.regnum;
      if (data.contact) { const cEl = document.getElementById('contact'); if (cEl) cEl.value = data.contact; try { updateCallLink(); } catch (e) {} }

      if (data.remark) {
        let matchOwnerTenant = data.remark.match(/^(OWNER|TENANT)/i), matchOther = data.remark.match(/^OTHER\s*\(/i);
        if (matchOwnerTenant) {
          document.getElementById('remark').value = matchOwnerTenant[1].toUpperCase();
          document.getElementById('remark').dispatchEvent(new Event('change'));
          let unitMatch = data.remark.match(/\(\s*([^)]+)\s*\)/);
          if (unitMatch) document.getElementById('unitNumber').value = unitMatch[1];
        } else if (matchOther) {
          document.getElementById('remark').value = "OTHER";
          document.getElementById('remark').dispatchEvent(new Event('change'));
          const otherEl = document.getElementById('otherCategory'); if (otherEl) otherEl.value = "";
          document.getElementById('unitNumber').value = "";
        } else {
          document.getElementById('remark').value = data.remark;
          document.getElementById('unitNumber').value = "";
          document.getElementById('otherCategory').value = "";
          document.getElementById('remark').dispatchEvent(new Event('change'));
        }
      }

      const rSel = document.getElementById('reasonSelect'), rOther = document.getElementById('reasonOther');
      const rawReason = (data && data.reason != null) ? String(data.reason).trim() : "", rawOther = (data && data.reasonOther != null) ? String(data.reasonOther).trim() : "";
      if (rSel && (rawReason || rawOther)) {
        let main = rawReason, other = "";
        const mOther = rawReason.match(/^OTHER\s*\(\s*([^\)]+)\s*\)$/i);
        if (mOther) { main = "Other"; other = (mOther[1] || ""); } else if (/^OTHER$/i.test(rawReason) && rawOther) { main = "Other"; other = rawOther; }
        const wantU = (main || "").trim().toUpperCase();
        
        const hit = Array.from(rSel.options || []).find(o => String(o.value || "").trim().toUpperCase() === wantU);
        let matchedValue = hit ? hit.value : "";
        
        rSel.value = matchedValue || main;
        rSel.dispatchEvent(new Event('change'));
        if (rOther) {
          const valU = String(rSel.value || "").trim().toUpperCase();
          rOther.value = (valU === "OTHER" || valU === "Other") ? (other || "").toUpperCase() : "";
        }
      }
    }

    /* =========================
       SUBMIT & VALIDATION
    ========================= */
    let __SE_isSubmitting = false;
    let __seActiveToastEl = null;

    function __seIsVisible(el) {
      if (!el || el.disabled) return false;
      if (!el.getClientRects || el.getClientRects().length === 0) return false;
      const cs = window.getComputedStyle ? getComputedStyle(el) : null;
      return !(cs && (cs.display === 'none' || cs.visibility === 'hidden' || cs.opacity === '0'));
    }

    function __seGetLabelText(el) {
      const id = el && el.id ? el.id : '';
      if (id) { const lbl = document.querySelector(`label[for="${CSS.escape(id)}"]`); if (lbl) return (lbl.textContent || '').trim(); }
      const ph = (el && el.getAttribute ? el.getAttribute('placeholder') : '') || '';
      const aria = (el && el.getAttribute ? el.getAttribute('aria-label') : '') || '';
      return ph || aria || (id || (el ? el.name : '') || '').toString().replace(/[_-]+/g, ' ').replace(/([a-z])([A-Z])/g, '$1 $2').replace(/\s+/g, ' ').trim().toUpperCase() || 'FIELD';
    }

    function __seFirstInvalid(formEl) {
      if (!formEl) return null;
      for (const el of formEl.querySelectorAll('input, select, textarea')) {
        if (!__seIsVisible(el)) continue;
        try { if (el.id === 'mykadPassport') validateMykadPassport(); } catch (e) {}
        try { if (el.id === 'contact') updateCallLink(); } catch (e) {}
        if (el.willValidate && el.validity && el.validity.valid === false) return el;
      }
      return null;
    }

    function __seToastGeom(el) {
      try {
        const r = el.getBoundingClientRect(), viewportW = window.innerWidth || document.documentElement.clientWidth || 360;
        const width = Math.max(260, Math.min(Math.min(viewportW - 16, 560), r.width));
        return { centerX: Math.max(8 + width / 2, Math.min(viewportW - 8 - width / 2, r.left + (r.width / 2))), width };
      } catch (e) {
        const vw = (window.innerWidth || 360); return { centerX: vw / 2, width: Math.min(vw - 16, 360) };
      }
    }

    function __seShowInvalidToast(el) {
      const title = `${__seGetLabelText(el)}: ${(el && el.validationMessage) ? el.validationMessage : 'Required'}`;
      const form = document.getElementById('registrationForm');
      if (form) { form.querySelectorAll('.se-invalid-blink').forEach(x => x.classList.remove('se-invalid-blink')); }
      try { el.classList.add('se-invalid-blink'); el.focus({ preventScroll: false }); el.scrollIntoView({ behavior: 'auto', block: 'center' }); } catch (e) {}

      if (window.Swal && typeof Swal.fire === 'function') {
        try { Swal.close(); } catch (e) {}
        setTimeout(() => {
          const g = __seToastGeom(el);
          try { Swal.close(); } catch (e) {}
          Swal.fire({
            toast: true, position: 'top', icon: 'warning', title: title, showConfirmButton: false,
            didOpen: (toast) => {
              try {
                __seActiveToastEl = el;
                const c = Swal.getContainer();
                try { if (c) c.classList.add('se-toast-near'); } catch (e) {}
                
                const toastH = (toast && toast.getBoundingClientRect) ? toast.getBoundingClientRect().height : 70;
                let top = el.getBoundingClientRect().top - toastH - 10;
                
                const header = document.querySelector('.fixed-header');
                const safeTop = (header ? header.offsetHeight : 0) + 6;
                
                if (top < safeTop) top = el.getBoundingClientRect().bottom + 10;
                const vh = window.innerHeight || document.documentElement.clientHeight || 640;
                if (top > vh - toastH - 6) top = Math.max(safeTop, vh - toastH - 6);
                if (c && g) {
                  c.style.cssText = `position:fixed; top:${top}px; left:${g.centerX}px; transform:translateX(-50%); right:auto; bottom:auto; width:${g.width}px; padding:0; margin:0; pointer-events:none;`;
                }
                if (toast) { toast.style.width = '100%'; toast.style.margin = '0'; toast.style.pointerEvents = 'auto'; }
              } catch (e) {}
              try { toast.addEventListener('click', () => Swal.close()); } catch (e) {}
            }
          });
        }, 60);
      } else { alert(title); }
    }

    function __seCloseToastOnEdit(target) {
      try { if (target && target.classList && target.classList.contains('se-invalid-blink')) target.classList.remove('se-invalid-blink'); } catch (e) {}
      try { if (__seActiveToastEl && target === __seActiveToastEl && window.Swal) { Swal.close(); __seActiveToastEl = null; } } catch (e) {}
    }
    document.addEventListener('input', (ev) => __seCloseToastOnEdit(ev && ev.target), true);
    document.addEventListener('change', (ev) => __seCloseToastOnEdit(ev && ev.target), true);

    (function __seEnsureNoValidate() {
      const f = document.getElementById('registrationForm');
      if (f) { try { f.noValidate = true; f.setAttribute('novalidate', 'novalidate'); } catch (e) {} }
    })();

    document.getElementById("registrationForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      try { validateMykadPassport(); updateCallLink(); } catch (e) {}

      const firstBad = __seFirstInvalid(this);
      if (firstBad) { __seShowInvalidToast(firstBad); return; }
      if (__SE_isSubmitting) return;

      __SE_isSubmitting = true;
      setSubmitBtnLoading(true);

      const deviceId = (() => {
        try {
          let v = localStorage.getItem('SE_DEVICE_ID');
          if (!v) { 
            v = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).slice(2)); 
            localStorage.setItem('SE_DEVICE_ID', v); 
          }
          return v;
        } catch (e) { return ''; }
      })();

      if (!window.__SE_CLIENT_TXN_ID) {
        window.__SE_CLIENT_TXN_ID = (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : (Date.now().toString(36) + Math.random().toString(36).slice(2));
      }
      
      const croppedImage = getVisibleCroppedImageData();
      
      let remarkValue = document.getElementById('remark').value;
      const otherCategoryVal = document.getElementById('otherCategory').value.trim();
      const unitNumberVal = document.getElementById('unitNumber').value.trim();
      if ((remarkValue === "OTHER" || remarkValue === "RESTAURANT DELIVERY") && otherCategoryVal) remarkValue = `${remarkValue} ( ${otherCategoryVal} )`;
      else if ((remarkValue === "OWNER" || remarkValue === "TENANT") && unitNumberVal) remarkValue = `${remarkValue} ( ${unitNumberVal} )`;

      const existingPhotoLink = (window.__SE_EXISTING_PHOTO_LINK || '').toString().trim();
      if (!croppedImage && !existingPhotoLink) {
        safeSwalFire({ title: 'ID PHOTO REQUIRED', text: 'Please take an ID photo before submitting.', icon: 'warning', confirmButtonText: 'OK' });
        setSubmitBtnLoading(false); __SE_isSubmitting = false; return;
      }

      const data = {
        clientTxnId: window.__SE_CLIENT_TXN_ID,
        deviceId: deviceId,
        namePassport: document.getElementById('namePassport').value,
        mykadPassport: document.getElementById('mykadPassport').value,
        regnum: document.getElementById('regnum').value,
        contact: document.getElementById('contact').value,
        remark: remarkValue,
        unitNumber: unitNumberVal,
        reason: document.getElementById('reasonSelect').value,
        reasonOther: document.getElementById('reasonOther').value.trim(),
        tower: document.getElementById('tower').value,
        imageUrl: croppedImage || ''
      };

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 30000);

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(data),
          cache: "no-store", keepalive: !(data && data.imageUrl), signal: controller.signal
        });
        
        if (!res.ok) {
           const errText = await res.text().catch(() => "");
           throw new Error(`HTTP ${res.status} ${res.statusText}${errText ? " - " + errText.slice(0, 200) : ""}`);
        }

        const ct = (res.headers.get("content-type") || "").toLowerCase();
        let respData = ct.includes("application/json") ? await res.json() : (() => { try { return JSON.parse(await res.text().catch(() => "")); } catch { return { success: false, message: await res.text().catch(() => "") }; } })();

        if (respData && respData.success) {
          safeSwalFire({
            title: 'SUCCESS!', text: 'Data submitted successfully!', icon: 'success', confirmButtonText: 'OK', background: 'linear-gradient(135deg,#e9f5e9,#fff,#d5ffe0)', color: '#176B39', timer: 5000, timerProgressBar: true
          });
          document.getElementById("registrationForm").reset();
          const callBtn = document.getElementById('callBtn'); if (callBtn) { callBtn.style.display = 'none'; callBtn.removeAttribute('href'); }
          if (previewImg) previewImg.src = "#";
          if (imageContainer) imageContainer.style.display = 'none';
          __SE_SUBMIT_PHOTO = ""; window.__SE_CLIENT_TXN_ID = null; window.__SE_LAST_SEARCH_STATUS = ''; window.__SE_EXISTING_PHOTO_LINK = '';
          if (watermarkOverlay) watermarkOverlay.style.display = '';
          ['unitNumber', 'otherCategory', 'reasonSection'].forEach(id => {
              const el = document.getElementById(id);
              if (el) el.style.display = 'none';
          });
          try { unitField.required = false; otherField.required = false; reasonSelect.required = false; reasonOther.required = false; } catch (e) {}
          if (reasonSelect) { reasonSelect.style.color = '#78b991'; reasonSelect.style.fontWeight = 'bold'; }
        } else {
          safeSwalFire({ title: 'ERROR!', text: 'Submit failed: ' + (respData.message || ''), icon: 'error', confirmButtonText: 'OK' });
        }
      } catch (err) {
        safeSwalFire({ title: 'ERROR!', text: 'Error submitting data: ' + err.message, icon: 'error', confirmButtonText: 'OK' });
      } finally {
        clearTimeout(timeoutId); setSubmitBtnLoading(false); __SE_isSubmitting = false;
      }
    });
  </script>
</body>
</html>
